name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SERVICE: accounting-service

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -q

  push-ghcr:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/${{ env.SERVICE }}:latest \
            -t ghcr.io/${{ github.repository_owner }}/${{ env.SERVICE }}:${{ github.sha }} \
            .
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.SERVICE }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.SERVICE }}:${{ github.sha }}
