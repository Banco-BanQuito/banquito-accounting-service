# Configuración de pruebas — base en memoria H2 (modo PostgreSQL), sin depender de Docker
spring.datasource.url=jdbc:h2:mem:accountingdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

accounting.reports.dir=./target/test-reports
