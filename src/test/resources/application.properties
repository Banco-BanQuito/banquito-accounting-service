# H2 en memoria (modo MySQL) para tests — no requiere Docker
spring.datasource.url=jdbc:h2:mem:accountingdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Mail dummy — sin excluir el auto-configure
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test

spring.profiles.active=test

accounting.reports.dir=./target/test-reports
accounting.grpc.port=0
