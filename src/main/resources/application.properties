spring.application.name=accounting-service
server.port=${SERVER_PORT:8082}

# Base de datos PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/accountingdb}
spring.datasource.username=${DB_USER:banquito}
spring.datasource.password=${DB_PASS:banquito123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# gRPC server — Oscar (account-core-service) llama a este puerto
accounting.grpc.port=${ACCOUNTING_GRPC_PORT:9092}

# Directorio donde el proceso EOD escribe el CSV del Balance de Comprobación
accounting.reports.dir=${ACCOUNTING_REPORTS_DIR:./reports}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
