spring.application.name=accounting-service
server.port=8082

# DataSource — PostgreSQL accountingdb (banquito-infra)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/accountingdb}
spring.datasource.username=${DB_USERNAME:banquito}
spring.datasource.password=${DB_PASSWORD:banquito123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Contabilidad — directorio donde el proceso EOD escribe el CSV del Balance de Comprobación
accounting.reports.dir=${ACCOUNTING_REPORTS_DIR:./reports}
